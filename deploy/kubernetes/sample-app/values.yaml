# Nudgebee Demo Environment - OpenTelemetry Demo Helm Values
#
# Minimal overrides from chart defaults. Per-component env vars come from
# chart defaults automatically. Using envOverrides (not env) to upsert
# without replacing the full default env list. This prevents breakage when
# the chart adds new env vars in future versions.

default:
  envOverrides:
    # Point all services to our external OTel Collector (in otel namespace)
    # instead of the chart's built-in collector
    - name: OTEL_COLLECTOR_NAME
      value: otel-deployment-collector-collector.otel.svc.cluster.local
    # Set resource attributes for service discovery and grouping
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: 'service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version={{ .Chart.AppVersion }}'

# Disable built-in OTel Collector -- we use our external deployment collector
# in the otel namespace which fans out to ClickHouse, VictoriaMetrics, Loki, etc.
opentelemetry-collector:
  enabled: false

# Disable observability backends -- Nudgebee stack handles metrics, logs, traces.
# Jaeger is kept enabled (chart default) for side-by-side trace debugging.
prometheus:
  enabled: false
grafana:
  enabled: false
opensearch:
  enabled: false

# Re-wire Jaeger SPM (Monitor tab) to point at the real Prometheus-compatible
# endpoint and external otel-collector, since this values file disables the
# chart's built-in `prometheus` and `opentelemetry-collector`. Without this
# override the chart defaults (`prometheus:9090`, `otel-collector:4318`) fail
# DNS lookup in the demo namespace and the Monitor tab errors out.
#
# normalize_calls/normalize_duration are flipped to false because the
# spanmetrics in VictoriaMetrics are exported as `traces_span_metrics_calls`
# (no `_total`) and `traces_span_metrics_duration_*` (no time-unit suffix).
jaeger:
  jaeger:
    extraEnv:
      - name: MEMORY_MAX_TRACES
        value: "25000"
      - name: PROMETHEUS_ADDR
        value: vmsingle-victoria-victoria-metrics-k8s-stack.victoria.svc.cluster.local:8429
      - name: OTEL_COLLECTOR_HOST
        value: otel-deployment-collector-collector.otel.svc.cluster.local
      - name: OTEL_COLLECTOR_PORT_HTTP
        value: "4318"
      - name: JAEGER_HOST
        value: "0.0.0.0"
      - name: JAEGER_GRPC_PORT
        value: "4317"
  userconfig:
    service:
      extensions: [jaeger_storage, jaeger_query, healthcheckv2]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [jaeger_storage_exporter]
      telemetry:
        resource:
          service.name: jaeger
        metrics:
          level: detailed
          readers:
            - periodic:
                interval: 10000
                timeout: 5000
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: http://${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_HTTP}
                    insecure: true
        logs:
          level: info
    extensions:
      healthcheckv2:
        use_v2: true
        http:
          endpoint: 0.0.0.0:13133
      jaeger_query:
        storage:
          traces: memory_backend
          metrics: metrics_backend
        base_path: /jaeger/ui
      jaeger_storage:
        backends:
          memory_backend:
            memory:
              max_traces: ${env:MEMORY_MAX_TRACES}
        metric_backends:
          metrics_backend:
            prometheus:
              endpoint: "http://${env:PROMETHEUS_ADDR}"
              normalize_calls: false
              normalize_duration: false

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: ${env:JAEGER_HOST}:${env:JAEGER_GRPC_PORT}

    processors:
      batch:

    exporters:
      jaeger_storage_exporter:
        trace_storage: memory_backend

# Per-component infrastructure overrides.
#
# Two distinct motivations grouped here:
#
#  1. Resource hygiene transition (`product-catalog`) — preserved from the
#     prior `requests: 128Mi → 20Mi` move; strategic merge patch can't clear
#     the old request, so we set both requests + limits explicitly until the
#     old ReplicaSet is gone.
#
#  2. Wire k8s probes + CPU limits so the otel-demo feature flags that
#     SIMULATE problems can actually MANIFEST as k8s-visible signals. The
#     application code respects these flags (e.g. cart's gRPC health check
#     reads `failedReadinessProbe`; ad burns CPU on `adHighCpu`), but with
#     no probe wired and no CPU limit set, the resulting failures stay
#     invisible to k8s — no `Unhealthy` event, no throttling metric. The
#     monitoring stack can't surface what k8s never observes. These additions
#     close that gap for the matrix scenarios we measured.
components:
  product-catalog:
    resources:
      requests:
        memory: 20Mi
      limits:
        memory: 20Mi

  # cart — wire a readinessProbe so the `failedReadinessProbe` flag manifests
  # as a k8s Unhealthy event. Cart's gRPC health check already reads the flag,
  # but the chart's values.schema.json only accepts `httpGet` probes. To bridge
  # that, Program.cs adds an HTTP `/healthz` endpoint backed by the same
  # `readinessCheck` instance, served on cart's existing Kestrel port (8080
  # by default, multiplexed with gRPC over h2c). httpGet here points at it.
  #
  # imageOverride points at the fork-built image (ghcr.io/nudgebee/opentelemetry-demo)
  # because /healthz was added in this fork; upstream `ghcr.io/open-telemetry/demo`
  # has no such endpoint and the probe would 404 on every poll.
  cart:
    imageOverride:
      repository: ghcr.io/nudgebee/opentelemetry-demo
      tag: latest-cart
      pullPolicy: Always
    readinessProbe:
      httpGet:
        path: /healthz
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 3

  # ad — set a CPU limit so `adHighCpu` produces throttling metrics.
  # Without a limit, the flag's CPU burn just consumes node CPU and the
  # kubelet emits no `container_cpu_cfs_throttled_*` series. 200m gives
  # the demo headroom under normal load and gets throttled hard under
  # the flag's busy-loop.
  ad:
    resources:
      requests:
        cpu: 100m
        memory: 300Mi
      limits:
        cpu: 200m
        memory: 300Mi

  # recommendation — CPU limit + tighter memory so
  # `recommendationCacheFailure` triggers OOM in a reasonable soak window
  # under demo-shaped traffic. The cache leak grows exponentially (1.4× per
  # 50% of requests); current 500Mi limit + low locust traffic means OOM
  # takes 30+ min. Tightening to 250Mi keeps the leak scenario actionable
  # without affecting steady-state.
  recommendation:
    resources:
      requests:
        cpu: 50m
        memory: 250Mi
      limits:
        cpu: 200m
        memory: 250Mi

  # email — CPU limit + slightly tighter memory. Leak code only runs per
  # request, so under low demo traffic the OOM signal is slow regardless;
  # keeping the limit modest at least makes the metric series exist.
  email:
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 100m
        memory: 100Mi
