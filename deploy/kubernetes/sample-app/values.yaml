# Nudgebee Demo Environment - OpenTelemetry Demo Helm Values
#
# Minimal overrides from chart defaults. Per-component env vars come from
# chart defaults automatically. Using envOverrides (not env) to upsert
# without replacing the full default env list. This prevents breakage when
# the chart adds new env vars in future versions.

default:
  envOverrides:
    # Point all services to our external OTel Collector (in otel namespace)
    # instead of the chart's built-in collector
    - name: OTEL_COLLECTOR_NAME
      value: otel-deployment-collector-collector.otel.svc.cluster.local
    # Set resource attributes for service discovery and grouping
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: 'service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version={{ .Chart.AppVersion }}'

# Disable built-in OTel Collector -- we use our external deployment collector
# in the otel namespace which fans out to ClickHouse, VictoriaMetrics, Loki, etc.
opentelemetry-collector:
  enabled: false

# Disable observability backends -- Nudgebee stack handles metrics, logs, traces.
# Jaeger is kept enabled (chart default) for side-by-side trace debugging.
prometheus:
  enabled: false
grafana:
  enabled: false
opensearch:
  enabled: false

# Temporary: explicit resources to transition from previous values that had
# requests: 128Mi. Strategic merge patch won't clear old requests field,
# so we set requests explicitly. Can be removed once the old ReplicaSet is gone.
components:
  ad:
    resources:
      requests:
        cpu: 120m
        memory: 360Mi
      limits:
        cpu: 120m
        memory: 360Mi
  product-catalog:
    resources:
      requests:
        memory: 20Mi
      limits:
        memory: 20Mi
