# Nudgebee Demo Environment - OpenTelemetry Demo Helm Values
#
# Minimal overrides from chart defaults. Per-component env vars come from
# chart defaults automatically. Using envOverrides (not env) to upsert
# without replacing the full default env list. This prevents breakage when
# the chart adds new env vars in future versions.

default:
  envOverrides:
    # Point all services to our external OTel Collector (in otel namespace)
    # instead of the chart's built-in collector
    - name: OTEL_COLLECTOR_NAME
      value: otel-deployment-collector-collector.otel.svc.cluster.local
    # Set resource attributes for service discovery and grouping
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: 'service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version={{ .Chart.AppVersion }}'

# Disable built-in OTel Collector -- we use our external deployment collector
# in the otel namespace which fans out to ClickHouse, VictoriaMetrics, Loki, etc.
opentelemetry-collector:
  enabled: false

# Disable observability backends -- Nudgebee stack handles metrics, logs, traces.
# Jaeger is kept enabled (chart default) for side-by-side trace debugging.
prometheus:
  enabled: false
grafana:
  enabled: false
opensearch:
  enabled: false

# Re-wire Jaeger SPM (Monitor tab) to point at the real Prometheus-compatible
# endpoint and external otel-collector, since this values file disables the
# chart's built-in `prometheus` and `opentelemetry-collector`. Without this
# override the chart defaults (`prometheus:9090`, `otel-collector:4318`) fail
# DNS lookup in the demo namespace and the Monitor tab errors out.
#
# normalize_calls/normalize_duration are flipped to false because the
# spanmetrics in VictoriaMetrics are exported as `traces_span_metrics_calls`
# (no `_total`) and `traces_span_metrics_duration_*` (no time-unit suffix).
jaeger:
  jaeger:
    extraEnv:
      - name: MEMORY_MAX_TRACES
        value: "25000"
      - name: PROMETHEUS_ADDR
        value: vmsingle-victoria-victoria-metrics-k8s-stack.victoria.svc.cluster.local:8429
      - name: OTEL_COLLECTOR_HOST
        value: otel-deployment-collector-collector.otel.svc.cluster.local
      - name: OTEL_COLLECTOR_PORT_HTTP
        value: "4318"
      - name: JAEGER_HOST
        value: "0.0.0.0"
      - name: JAEGER_GRPC_PORT
        value: "4317"
  userconfig: |
    service:
      extensions: [jaeger_storage, jaeger_query, healthcheckv2]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [jaeger_storage_exporter]
      telemetry:
        resource:
          service.name: jaeger
        metrics:
          level: detailed
          readers:
            - periodic:
                interval: 10000
                timeout: 5000
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: http://${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_HTTP}
                    insecure: true
        logs:
          level: info
    extensions:
      healthcheckv2:
        use_v2: true
        http:
          endpoint: 0.0.0.0:13133
      jaeger_query:
        storage:
          traces: memory_backend
          metrics: metrics_backend
        base_path: /jaeger/ui
      jaeger_storage:
        backends:
          memory_backend:
            memory:
              max_traces: ${env:MEMORY_MAX_TRACES}
        metric_backends:
          metrics_backend:
            prometheus:
              endpoint: "http://${env:PROMETHEUS_ADDR}"
              normalize_calls: false
              normalize_duration: false

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: ${env:JAEGER_HOST}:${env:JAEGER_GRPC_PORT}

    processors:
      batch:

    exporters:
      jaeger_storage_exporter:
        trace_storage: memory_backend

# Temporary: explicit resources to transition from previous values that had
# requests: 128Mi. Strategic merge patch won't clear old requests field,
# so we set requests explicitly. Can be removed once the old ReplicaSet is gone.
components:
  product-catalog:
    resources:
      requests:
        memory: 20Mi
      limits:
        memory: 20Mi
  ad:
    resources:
      requests:
        cpu: 120m
        memory: 360Mi
      limits:
        cpu: 120m
        memory: 360Mi
