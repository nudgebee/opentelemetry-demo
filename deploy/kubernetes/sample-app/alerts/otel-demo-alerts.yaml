apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: otel-demo-alerts
  namespace: victoria
  labels:
    app: otel-demo
spec:
  groups:
  - interval: 15s
    name: otel-demo-http-errors
    rules:
    - alert: OtelDemoHTTPErrorRate
      annotations:
        description: |-
          HTTP 5xx error rate exceeded 1%.
          Service: {{ $labels.service_name }}
          Route: {{ $labels.http_route }}
          Deployment: {{ $labels.k8s_deployment_name }}
          Pod: {{ $labels.pod }}
          Error Rate: {{ $value | humanizePercentage }}
        summary: High HTTP error rate for {{ $labels.service_name }} {{ $labels.http_route }} in demo namespace
      expr: |-
        (
          sum by (service_name, http_route, k8s_deployment_name, pod, namespace) (
            rate(http_server_request_duration_count{namespace="demo", http_response_status_code=~"5.."}[5m])
          )
          /
          sum by (service_name, http_route, k8s_deployment_name, pod, namespace) (
            rate(http_server_request_duration_count{namespace="demo"}[5m])
          )
        ) > 0.01
      for: 5m
      labels:
        severity: critical
    - alert: OtelDemoHighLatency
      annotations:
        description: |-
          P95 latency exceeded 5 seconds.
          Service: {{ $labels.service_name }}
          Route: {{ $labels.http_route }}
          Deployment: {{ $labels.k8s_deployment_name }}
          Pod: {{ $labels.pod }}
          P95 Latency: {{ $value | humanizeDuration }}
        summary: High P95 latency for {{ $labels.service_name }} {{ $labels.http_route }} in demo namespace
      expr: |-
        (
          histogram_quantile(0.95,
            sum by (service_name, http_route, k8s_deployment_name, pod, namespace, le) (
              rate(http_server_request_duration_bucket{namespace="demo"}[5m])
            )
          )
        ) > 5
      for: 5m
      labels:
        severity: warning
  - interval: 15s
    name: otel-demo-grpc-errors
    rules:
    - alert: OtelDemoGRPCErrorRate
      annotations:
        description: |-
          gRPC server error rate exceeded 1%.
          Service: {{ $labels.service_name }}
          RPC: {{ $labels.rpc_service }}/{{ $labels.rpc_method }}
          Deployment: {{ $labels.k8s_deployment_name }}
          Pod: {{ $labels.pod }}
          Error Rate: {{ $value | humanizePercentage }}
        summary: High gRPC server error rate for {{ $labels.service_name }} {{ $labels.rpc_service }}/{{ $labels.rpc_method }} in demo namespace
      expr: |-
        (
          sum by (service_name, rpc_service, rpc_method, k8s_deployment_name, pod, namespace) (
            rate(rpc_server_duration_count{namespace="demo", rpc_grpc_status_code!="0"}[5m])
          )
          /
          sum by (service_name, rpc_service, rpc_method, k8s_deployment_name, pod, namespace) (
            rate(rpc_server_duration_count{namespace="demo"}[5m])
          )
        ) > 0.01
      for: 5m
      labels:
        severity: critical
    - alert: OtelDemoGRPCClientErrorRate
      annotations:
        description: |-
          gRPC client error rate exceeded 5% when calling downstream service.
          Caller: {{ $labels.service_name }}
          Target: {{ $labels.rpc_service }}/{{ $labels.rpc_method }}
          Deployment: {{ $labels.k8s_deployment_name }}
          Pod: {{ $labels.pod }}
          Error Rate: {{ $value | humanizePercentage }}
        summary: High gRPC client error rate from {{ $labels.service_name }} calling {{ $labels.rpc_service }}/{{ $labels.rpc_method }}
      expr: |-
        (
          sum by (service_name, k8s_deployment_name, pod, namespace, rpc_service, rpc_method) (
            rate(rpc_client_duration_count{namespace="demo", rpc_grpc_status_code!="0"}[5m])
          )
          /
          sum by (service_name, k8s_deployment_name, pod, namespace, rpc_service, rpc_method) (
            rate(rpc_client_duration_count{namespace="demo"}[5m])
          )
        ) > 0.05
      for: 5m
      labels:
        severity: critical
    # Same signal as OtelDemoGRPCErrorRate above, for services instrumented
    # against newer semantic conventions.
    #
    # OpenTelemetry renamed rpc.server.duration to rpc.server.call.duration and
    # changed the status attribute from rpc.grpc.status_code (numeric, "0" = ok)
    # to rpc.response.status_code (string, "OK"). Services therefore split across
    # two metric names with incompatible labels: ad and checkout still emit
    # rpc_server_duration, while product-catalog emits rpc_server_call_duration.
    #
    # The rule above matches only the older name, so product-catalog - the
    # service most demo scenarios fault - could never raise a server-side error
    # alert. Its failures showed up solely as client errors on checkout, leaving
    # the failing service itself silent and giving correlation no alert on the
    # actual root.
    #
    # Kept as a separate rule rather than folded into the one above because the
    # label sets are not compatible: there is no rpc_service label here, the full
    # "Service/Method" lives in rpc_method, and the error filter is a different
    # attribute with different values.
    #
    # As with every rule in this file, namespace="demo" in the expression selects
    # where the METRICS come from, which is not the same as metadata.namespace
    # above (where this rule object lives). Installing the demo into a different
    # namespace means updating that selector, or the rule silently matches
    # nothing. See alerts/README.md.
    - alert: OtelDemoGRPCServerErrorRate
      annotations:
        description: |-
          gRPC server error rate exceeded 1%.
          Service: {{ $labels.service_name }}
          Method: {{ $labels.rpc_method }}
          Deployment: {{ $labels.k8s_deployment_name }}
          Pod: {{ $labels.pod }}
          Error Rate: {{ $value | humanizePercentage }}
        summary: High gRPC server error rate for {{ $labels.service_name }} {{ $labels.rpc_method }} in demo namespace
      expr: |-
        (
          sum by (service_name, k8s_deployment_name, pod, namespace, rpc_method) (
            rate(rpc_server_call_duration_count{namespace="demo", rpc_response_status_code!="OK"}[5m])
          )
          /
          sum by (service_name, k8s_deployment_name, pod, namespace, rpc_method) (
            rate(rpc_server_call_duration_count{namespace="demo"}[5m])
          )
        ) > 0.01
      for: 5m
      labels:
        severity: critical
